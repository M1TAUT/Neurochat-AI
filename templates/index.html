<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8"/>
    <title>NeuroChat AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>

    <!-- Иконка -->
    <link
            rel="icon"
            href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>"
    />

    <!-- Иконки -->
    <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <!-- Markdown + подсветка кода (как в ChatGPT) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
    <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        :root {
          --bg-main-dark: #050816;
          --bg-alt-dark: #0b1020;
          --bg-input-dark: #111827;
          --border-dark: #1f2937;
          --accent: #22c55e;
          --accent-soft: rgba(34, 197, 94, 0.12);
          --accent-strong: rgba(34, 197, 94, 0.35);
          --danger: #ef4444;
          --text-main-dark: #f9fafb;
          --text-muted-dark: #9ca3af;

          --bg-main-light: #f9fafb;
          --bg-alt-light: #ffffff;
          --bg-input-light: #f3f4f6;
          --border-light: #e5e7eb;
          --text-main-light: #111827;
          --text-muted-light: #6b7280;

          --radius-lg: 18px;
          --radius-md: 12px;
          --radius-sm: 8px;
          --shadow-soft: 0 18px 40px rgba(15, 23, 42, 0.4);
          --transition-fast: 0.18s ease-out;
          --transition-normal: 0.25s ease-out;
        }

        * {
          box-sizing: border-box;
          margin: 0;
          padding: 0;
        }

        html,
        body {
          height: 100%;
        }

        body {
          font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
            "Segoe UI", sans-serif;
          -webkit-font-smoothing: antialiased;
          background: radial-gradient(circle at top, #111827 0, #020617 40%, #020617 100%);
          color: var(--text-main-dark);
        }

        [data-theme="light"] body {
          background: radial-gradient(circle at top, #e5e7eb 0, #f9fafb 40%, #f9fafb 100%);
          color: var(--text-main-light);
        }

        /* Layout */

        .app {
          display: flex;
          height: 100vh;
          max-width: 1200px;
          margin: 0 auto;
          padding: 16px;
          gap: 16px;
        }

        .sidebar {
          width: 260px;
          border-radius: var(--radius-lg);
          padding: 16px 16px 14px;
          display: flex;
          flex-direction: column;
          gap: 14px;
          backdrop-filter: blur(20px);
          background: radial-gradient(circle at top left, #111827 0, #020617 60%);
          border: 1px solid rgba(148, 163, 184, 0.2);
        }

        [data-theme="light"] .sidebar {
          background: linear-gradient(145deg, #ffffff, #f3f4f6);
          border-color: rgba(148, 163, 184, 0.35);
        }

        .main {
          flex: 1;
          display: flex;
          flex-direction: column;
          border-radius: var(--radius-lg);
          border: 1px solid rgba(148, 163, 184, 0.2);
          backdrop-filter: blur(22px);
          background: radial-gradient(circle at top left, #020617, #020617 55%, #020617);
          overflow: hidden;
          box-shadow: var(--shadow-soft);
        }

        [data-theme="light"] .main {
          background: linear-gradient(145deg, #ffffff, #f3f4f6);
          border-color: rgba(148, 163, 184, 0.35);
          box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
        }

        /* Sidebar content */

        .logo-row {
          display: flex;
          align-items: center;
          gap: 10px;
          padding-inline: 4px;
        }

        .logo-icon {
          width: 36px;
          height: 36px;
          border-radius: 999px;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 18px;
          background: radial-gradient(circle at 10% 0, #22c55e, #0ea5e9 45%, #6366f1);
          animation: subtlePulse 4s infinite ease-in-out;
          box-shadow: 0 0 0 1px rgba(148, 163, 184, 0.35),
            0 12px 30px rgba(15, 23, 42, 0.6);
        }

        .logo-text {
          display: flex;
          flex-direction: column;
          gap: 1px;
        }

        .logo-title {
          font-size: 16px;
          font-weight: 600;
          letter-spacing: 0.03em;
        }

        .logo-sub {
          font-size: 11px;
          color: var(--text-muted-dark);
        }

        [data-theme="light"] .logo-sub {
          color: var(--text-muted-light);
        }

        .status-card {
          margin-top: 4px;
          padding: 10px 12px;
          border-radius: var(--radius-md);
          border: 1px solid rgba(148, 163, 184, 0.3);
          background: radial-gradient(circle at 0 0, rgba(34, 197, 94, 0.16), transparent 60%);
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 8px;
          font-size: 12px;
        }

        [data-theme="light"] .status-card {
          background: radial-gradient(circle at 0 0, rgba(34, 197, 94, 0.12), transparent 60%);
        }

        .status-main {
          display: flex;
          align-items: center;
          gap: 8px;
        }

        .status-dot {
          width: 9px;
          height: 9px;
          border-radius: 999px;
          background: #f97316;
          box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.6);
          animation: ping 1.4s infinite;
        }

        .status-dot.connected {
          background: #22c55e;
          box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7);
          animation: ping 1.8s infinite;
        }

        .status-text-main {
          font-weight: 500;
          font-size: 12px;
        }

        .status-text-sub {
          font-size: 11px;
          color: var(--text-muted-dark);
        }

        [data-theme="light"] .status-text-sub {
          color: var(--text-muted-light);
        }

        .sidebar-footer {
          margin-top: auto;
          padding-top: 10px;
          border-top: 1px dashed rgba(148, 163, 184, 0.4);
          font-size: 11px;
          color: var(--text-muted-dark);
          display: flex;
          justify-content: space-between;
          align-items: center;
        }

        [data-theme="light"] .sidebar-footer {
          color: var(--text-muted-light);
        }

        .pill {
          border-radius: 999px;
          padding: 4px 8px;
          background: rgba(15, 23, 42, 0.75);
          border: 1px solid rgba(148, 163, 184, 0.5);
          font-size: 10px;
          display: inline-flex;
          align-items: center;
          gap: 4px;
        }

        [data-theme="light"] .pill {
          background: rgba(255, 255, 255, 0.85);
        }

        /* Chat header */

        .header {
          padding: 12px 18px;
          border-bottom: 1px solid rgba(148, 163, 184, 0.26);
          display: flex;
          justify-content: space-between;
          align-items: center;
          background: radial-gradient(circle at top right, rgba(34, 197, 94, 0.14), transparent 55%);
        }

        [data-theme="light"] .header {
          background: radial-gradient(circle at top right, rgba(34, 197, 94, 0.08), transparent 55%);
        }

        .header-left h1 {
          font-size: 16px;
          font-weight: 600;
          letter-spacing: 0.03em;
        }

        .header-left p {
          margin-top: 2px;
          font-size: 12px;
          color: var(--text-muted-dark);
        }

        [data-theme="light"] .header-left p {
          color: var(--text-muted-light);
        }

        .header-actions {
          display: flex;
          gap: 8px;
        }

        .icon-btn {
          width: 30px;
          height: 30px;
          border-radius: 999px;
          border: 1px solid rgba(148, 163, 184, 0.4);
          display: inline-flex;
          align-items: center;
          justify-content: center;
          cursor: pointer;
          font-size: 13px;
          color: var(--text-muted-dark);
          background: rgba(15, 23, 42, 0.8);
          transition: transform var(--transition-fast), box-shadow var(--transition-fast),
            border-color var(--transition-fast), background var(--transition-fast),
            color var(--transition-fast);
        }

        [data-theme="light"] .icon-btn {
          background: rgba(255, 255, 255, 0.82);
          color: var(--text-muted-light);
        }

        .icon-btn:hover {
          transform: translateY(-1px);
          border-color: rgba(148, 163, 184, 0.8);
          color: #e5e7eb;
          box-shadow: 0 10px 25px rgba(15, 23, 42, 0.7);
        }

        [data-theme="light"] .icon-btn:hover {
          color: #020617;
          box-shadow: 0 10px 25px rgba(15, 23, 42, 0.2);
        }

        .icon-btn.primary {
          background: #22c55e;
          border-color: transparent;
          color: #022c22;
          box-shadow: 0 12px 26px rgba(22, 163, 74, 0.5);
        }

        .icon-btn.primary:hover {
          background: #16a34a;
          transform: translateY(-1px) scale(1.02);
          box-shadow: 0 16px 40px rgba(21, 128, 61, 0.7);
        }

        /* Messages */

        .messages {
          flex: 1;
          padding: 14px 18px 8px;
          overflow-y: auto;
          scroll-behavior: smooth;
        }

        .welcome {
          max-width: 560px;
          margin: 48px auto 40px;
          text-align: center;
        }

        .welcome-title {
          font-size: 28px;
          font-weight: 600;
          letter-spacing: 0.02em;
          margin-bottom: 6px;
          background: linear-gradient(120deg, #22c55e, #0ea5e9, #6366f1);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
        }

        .welcome-sub {
          font-size: 13px;
          color: var(--text-muted-dark);
          max-width: 420px;
          margin: 0 auto;
        }

        [data-theme="light"] .welcome-sub {
          color: var(--text-muted-light);
        }

        .examples {
          margin-top: 24px;
          display: flex;
          flex-wrap: wrap;
          gap: 8px;
          justify-content: center;
          font-size: 11px;
        }

        .example-pill {
          padding: 6px 10px;
          border-radius: 999px;
          border: 1px dashed rgba(148, 163, 184, 0.5);
          background: rgba(15, 23, 42, 0.7);
          color: var(--text-muted-dark);
          cursor: pointer;
          transition: background var(--transition-fast), border-color var(--transition-fast),
            transform var(--transition-fast), color var(--transition-fast);
        }

        [data-theme="light"] .example-pill {
          background: rgba(255, 255, 255, 0.92);
          color: var(--text-muted-light);
        }

        .example-pill:hover {
          background: #22c55e;
          border-color: transparent;
          color: #022c22;
          transform: translateY(-1px);
        }

        .message-row {
          display: flex;
          gap: 10px;
          margin-bottom: 10px;
        }

        .avatar {
          width: 26px;
          height: 26px;
          border-radius: 999px;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 13px;
          flex-shrink: 0;
        }

        .avatar.user {
          background: rgba(148, 163, 184, 0.25);
          color: #e5e7eb;
        }

        .avatar.assistant {
          background: radial-gradient(circle at 10% 0, #22c55e, #0ea5e9 60%);
          color: #ecfdf5;
        }

        .bubble {
          max-width: 100%;
          border-radius: 14px;
          padding: 10px 12px;
          font-size: 13px;
          line-height: 1.5;
          border: 1px solid transparent;
          background: rgba(15, 23, 42, 0.8);
        }

        [data-theme="light"] .bubble {
          background: rgba(249, 250, 251, 0.96);
          border-color: rgba(229, 231, 235, 1);
        }

        .bubble.user {
          margin-left: auto;
          background: linear-gradient(135deg, #22c55e, #0ea5e9);
          color: #ecfdf5;
          border-color: transparent;
        }

        .bubble.assistant {
          background: rgba(15, 23, 42, 0.88);
          border-color: rgba(148, 163, 184, 0.45);
        }

        [data-theme="light"] .bubble.assistant {
          background: #ffffff;
          border-color: rgba(148, 163, 184, 0.45);
        }

        .bubble.error {
          border-color: rgba(248, 113, 113, 0.7);
          color: #fecaca;
          background: rgba(30, 64, 175, 0.1);
        }

        .meta {
          margin-top: 4px;
          font-size: 11px;
          color: var(--text-muted-dark);
          display: flex;
          justify-content: flex-end;
          gap: 6px;
        }

        [data-theme="light"] .meta {
          color: var(--text-muted-light);
        }

        .stat-badge {
          padding: 2px 6px;
          border-radius: 999px;
          background: rgba(15, 23, 42, 0.75);
          color: #e5e7eb;
          border: 1px solid rgba(148, 163, 184, 0.6);
        }

        [data-theme="light"] .stat-badge {
          background: rgba(255, 255, 255, 0.9);
          color: #111827;
        }

        .thinking {
          display: inline-flex;
          align-items: center;
          gap: 8px;
          padding: 8px 10px;
          border-radius: 999px;
          border: 1px dashed rgba(148, 163, 184, 0.6);
          background: rgba(15, 23, 42, 0.9);
          font-size: 11px;
          color: var(--text-muted-dark);
        }

        [data-theme="light"] .thinking {
          background: rgba(255, 255, 255, 0.96);
          color: var(--text-muted-light);
        }

        .dots {
          display: flex;
          gap: 4px;
        }

        .dot {
          width: 6px;
          height: 6px;
          border-radius: 999px;
          background: #22c55e;
          animation: typing 1.5s infinite ease-in-out;
        }

        .dot:nth-child(2) {
          animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
          animation-delay: 0.4s;
        }

        /* Input area */

        .input {
          border-top: 1px solid rgba(148, 163, 184, 0.28);
          padding: 10px 14px 12px;
          background: radial-gradient(circle at top, rgba(15, 23, 42, 0.96), rgba(15, 23, 42, 0.96));
        }

        [data-theme="light"] .input {
          background: linear-gradient(0deg, #f9fafb, #ffffff);
        }

        .input-inner {
          display: flex;
          gap: 8px;
          align-items: flex-end;
          max-width: 860px;
          margin: 0 auto;
        }

        .textarea-wrap {
          flex: 1;
          border-radius: var(--radius-md);
          border: 1px solid rgba(148, 163, 184, 0.55);
          background: rgba(15, 23, 42, 0.9);
          padding: 8px 10px;
          display: flex;
          align-items: center;
        }

        [data-theme="light"] .textarea-wrap {
          background: rgba(255, 255, 255, 0.98);
        }

        textarea {
          border: none;
          outline: none;
          resize: none;
          width: 100%;
          max-height: 140px;
          background: transparent;
          color: inherit;
          font: inherit;
          font-size: 13px;
          line-height: 1.45;
        }

        textarea::placeholder {
          color: var(--text-muted-dark);
        }

        [data-theme="light"] textarea::placeholder {
          color: var(--text-muted-light);
        }

        .send-btn {
          width: 36px;
          height: 36px;
          border-radius: 999px;
          border: none;
          cursor: pointer;
          display: inline-flex;
          align-items: center;
          justify-content: center;
          background: #22c55e;
          color: #022c22;
          box-shadow: 0 10px 26px rgba(22, 163, 74, 0.6);
          transition: transform var(--transition-fast), box-shadow var(--transition-fast),
            background var(--transition-fast), opacity 0.1s;
          font-size: 14px;
          flex-shrink: 0;
        }

        .send-btn:disabled {
          opacity: 0.4;
          cursor: default;
          box-shadow: none;
        }

        .send-btn:not(:disabled):hover {
          transform: translateY(-1px) scale(1.02);
          background: #16a34a;
          box-shadow: 0 16px 36px rgba(21, 128, 61, 0.75);
        }

        .input-hint {
          margin-top: 4px;
          font-size: 10px;
          color: var(--text-muted-dark);
          text-align: center;
        }

        [data-theme="light"] .input-hint {
          color: var(--text-muted-light);
        }

        /* Scrollbar */

        .messages::-webkit-scrollbar {
          width: 6px;
        }
        .messages::-webkit-scrollbar-track {
          background: transparent;
        }
        .messages::-webkit-scrollbar-thumb {
          background: rgba(148, 163, 184, 0.5);
          border-radius: 999px;
        }

        /* Animations */

        @keyframes subtlePulse {
          0%,
          100% {
            transform: translateY(0) scale(1);
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.6);
          }
          50% {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.9);
          }
        }

        @keyframes ping {
          0% {
            transform: scale(1);
            box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7);
          }
          70% {
            transform: scale(1.3);
            box-shadow: 0 0 0 8px rgba(34, 197, 94, 0);
          }
          100% {
            transform: scale(1);
            box-shadow: 0 0 0 0 rgba(34, 197, 94, 0);
          }
        }

        @keyframes typing {
          0%,
          60%,
          100% {
            transform: translateY(0);
            opacity: 0.45;
          }
          30% {
            transform: translateY(-3px);
            opacity: 1;
          }
        }

        /* Code in messages */

        .bubble pre {
          background: #020617;
          border-radius: 10px;
          padding: 10px;
          overflow-x: auto;
          font-size: 12px;
          border: 1px solid rgba(15, 23, 42, 0.9);
          margin-top: 6px;
        }

        [data-theme="light"] .bubble pre {
          background: #020617;
          color: #e5e7eb;
        }

        .bubble code {
          background: rgba(15, 23, 42, 0.85);
          padding: 2px 5px;
          border-radius: 4px;
          font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco,
            Consolas, "Liberation Mono", "Courier New", monospace;
          font-size: 12px;
          border: 1px solid rgba(30, 64, 175, 0.6);
        }

        [data-theme="light"] .bubble code {
          background: #020617;
          color: #e5e7eb;
        }

        /* Mobile */

        @media (max-width: 900px) {
          .app {
            flex-direction: column;
            padding: 10px;
          }
          .sidebar {
            width: 100%;
            flex-direction: row;
            align-items: center;
            padding: 10px 12px;
          }
          .status-card {
            flex: 1;
            margin-top: 0;
            margin-left: 8px;
          }
          .sidebar-footer {
            display: none;
          }
        }

        @media (max-width: 640px) {
          .app {
            padding: 8px;
          }
          .header {
            padding-inline: 12px;
          }
          .messages {
            padding-inline: 12px;
          }
          .input {
            padding-inline: 10px;
          }
        }
        .main ul, .main ol {
            margin-left: 10px !important; /* Принудительно отодвигаем весь блок */
            padding-left: 10px !important; /* Создаем место для самих точек */
            list-style-position: outside !important; /* Выносим точки за текст */
            display: block !important;
        }

        .main li {
            display: list-item !important; /* Возвращаем стандартное поведение списка */
            margin-bottom: 8px;
            padding-left: 5px;
        }

    </style>
</head>
<body>
<div class="app">
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div>
            <div class="logo-row">
                <div class="logo-icon">🧠</div>
                <div class="logo-text">
                    <div class="logo-title">NeuroChat</div>
                    <div class="logo-sub">глубокий диалоговый интеллект</div>
                </div>
            </div>
            <div class="status-card">
                <div class="status-main">
                    <div id="statusDot" class="status-dot"></div>
                    <div>
                        <div id="statusText" class="status-text-main">
                            Проверка подключения…
                        </div>
                        <div class="status-text-sub">/api/status • v1</div>
                    </div>
                </div>
                <button
                        class="icon-btn"
                        style="font-size: 11px; padding: 0 6px"
                        title="Обновить статус"
                        onclick="manualStatusCheck(event)"
                >
                    <i class="fa-solid fa-rotate-right"></i>
                </button>
            </div>
        </div>

        <div class="sidebar-footer">
            <span>NeuroChat UI</span>
            <span class="pill">
          <i class="fa-regular fa-sparkles fa-stars"></i>
          minimal
        </span>
        </div>
    </aside>

    <!-- MAIN PANEL -->
    <section class="main">
        <header class="header">
            <div class="header-left">
                <h1>NeuroChat AI</h1>
                <p id="headerSubtitle">Готов к диалогу</p>
            </div>
            <div class="header-actions">
                <button
                        class="icon-btn"
                        onclick="toggleTheme()"
                        title="Тёмная / светлая тема"
                >
                    <i class="fa-solid fa-circle-half-stroke"></i>
                </button>
                <button class="icon-btn" onclick="clearChat()" title="Новый чат">
                    <i class="fa-regular fa-file-lines"></i>
                </button>
                <button
                        class="icon-btn primary"
                        onclick="focusInput()"
                        title="Фокус на поле ввода"
                >
                    <i class="fa-solid fa-pen"></i>
                </button>
            </div>
        </header>

        <main id="messages" class="messages">
            <div id="welcome" class="welcome">
                <div class="welcome-title">Начнём новый диалог</div>
                <div class="welcome-sub">
                    Задайте вопрос, попросите объяснить код, придумать текст или
                    помочь с идеей.
                </div>
                <div class="examples">
                    <button
                            class="example-pill"
                            onclick="useExample('Объясни этот фрагмент кода на Python простыми словами.')"
                    >
                        Объяснение кода
                    </button>
                    <button
                            class="example-pill"
                            onclick="useExample('Сгенерируй идею минималистичного лендинга для IT‑стартапа.')"
                    >
                        Идея лендинга
                    </button>
                    <button
                            class="example-pill"
                            onclick="useExample('Помоги сформулировать вежливое письмо клиенту.')"
                    >
                        Письмо клиенту
                    </button>
                </div>
            </div>
        </main>

        <footer class="input">
            <div class="input-inner">
                <div class="textarea-wrap">
            <textarea
                    id="input"
                    rows="1"
                    placeholder="Напишите сообщение NeuroChat…"
                    disabled
            ></textarea>
                </div>
                <button
                        id="sendButton"
                        class="send-btn"
                        onclick="sendMessage()"
                        disabled
                >
                    <i class="fa-solid fa-paper-plane-top fa-paper-plane"></i>
                </button>
            </div>
            <div class="input-hint">
                Enter — отправить • Shift+Enter — новая строка
            </div>
        </footer>
    </section>
</div>

<script>
    // --- THEME ---
    const rootEl = document.documentElement;
    const themeKey = "neurochat_theme";

    function applyTheme(theme) {
      rootEl.setAttribute("data-theme", theme);
    }

    function toggleTheme() {
      const current = rootEl.getAttribute("data-theme") || "dark";
      const next = current === "dark" ? "light" : "dark";
      applyTheme(next);
      localStorage.setItem(themeKey, next);
    }

    // Init theme
    (function initTheme() {
      const saved = localStorage.getItem(themeKey);
      applyTheme(saved || "dark");
    })();

    // --- STATUS / API ---

    let apiStatus = "checking";

    const statusDot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");
    const headerSubtitle = document.getElementById("headerSubtitle");
    const sendBtn = document.getElementById("sendButton");
    const inputEl = document.getElementById("input");

    function setStatus(status, message) {
      apiStatus = status;
      statusDot.className = "status-dot" + (status === "connected" ? " connected" : "");
      statusText.textContent = message;
      if (status === "connected") {
        headerSubtitle.textContent = "Сервер подключён • готов отвечать";
        inputEl.disabled = false;
        sendBtn.disabled = false;
        inputEl.placeholder = "Напишите сообщение NeuroChat…";
        setTimeout(() => inputEl.focus(), 200);
      } else if (status === "error") {
        headerSubtitle.textContent = "Нет подключения к API";
        inputEl.disabled = true;
        sendBtn.disabled = true;
        inputEl.placeholder = "Ожидание восстановления подключения…";
      } else {
        headerSubtitle.textContent = "Проверяем состояние API…";
        inputEl.disabled = true;
        sendBtn.disabled = true;
      }
    }

    async function checkStatus() {
      try {
        const res = await fetch("/api/status");
        const data = await res.json();
        if (data.status === "connected") {
          setStatus("connected", "Подключено");
        } else {
          setStatus("error", data.message || "Ошибка API");
        }
      } catch (e) {
        setStatus("error", "Сетевая ошибка");
      }
    }

    function manualStatusCheck(evt) {
      const btn = evt.currentTarget;
      const original = btn.innerHTML;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
      checkStatus().finally(() => {
        setTimeout(() => {
          btn.innerHTML = original;
        }, 600);
      });
    }

    // периодическая проверка
    checkStatus();
    setInterval(checkStatus, 30000);

    // --- CHAT ---

    const messagesEl = document.getElementById("messages");
    let thinkingEl = null;

    function focusInput() {
      inputEl.focus();
    }

    function useExample(text) {
      inputEl.value = text;
      resizeTextarea();
      focusInput();
    }

    function ensureWelcomeHidden() {
      const welcome = document.getElementById("welcome");
      if (welcome) {
        welcome.remove();
      }
    }

    function appendMessage(role, content, stats) {
      ensureWelcomeHidden();

      const row = document.createElement("div");
      row.className = "message-row";

      const avatar = document.createElement("div");
      avatar.className = "avatar " + role;
      avatar.textContent = role === "user" ? "Вы" : "AI";

      const bubbleWrap = document.createElement("div");
      const bubble = document.createElement("div");
      bubble.className = "bubble " + role;

      if (role === "assistant") {
        const html = marked.parse(content);
        bubble.innerHTML = html;
        setTimeout(() => {
          bubble.querySelectorAll("pre code").forEach((block) => {
            try {
              hljs.highlightElement(block);
            } catch {}
          });
        }, 0);
      } else {
        bubble.textContent = content;
      }

      bubbleWrap.appendChild(bubble);

      if (stats) {
        const meta = document.createElement("div");
        meta.className = "meta";
        const timeSpan = document.createElement("span");
        timeSpan.textContent = new Date().toLocaleTimeString();
        meta.appendChild(timeSpan);

        if (typeof stats.tokens === "number") {
          const tokens = document.createElement("span");
          tokens.className = "stat-badge";
          tokens.textContent = stats.tokens + " токенов";
          meta.appendChild(tokens);
        }
        if (typeof stats.time === "number") {
          const t = document.createElement("span");
          t.className = "stat-badge";
          t.textContent = stats.time + " мс";
          meta.appendChild(t);
        }

        bubbleWrap.appendChild(meta);
      }

      row.appendChild(avatar);
      row.appendChild(bubbleWrap);
      messagesEl.appendChild(row);

      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showThinking() {
      ensureWelcomeHidden();
      if (thinkingEl) return;

      const row = document.createElement("div");
      row.className = "message-row";

      const avatar = document.createElement("div");
      avatar.className = "avatar assistant";
      avatar.textContent = "AI";

      const wrap = document.createElement("div");
      const t = document.createElement("div");
      t.className = "thinking";
      t.innerHTML = `
        <div class="dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
        <span>NeuroChat пишет ответ…</span>
      `;

      wrap.appendChild(t);
      row.appendChild(avatar);
      row.appendChild(wrap);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      thinkingEl = row;
    }

    function hideThinking() {
      if (thinkingEl) {
        thinkingEl.remove();
        thinkingEl = null;
      }
    }

    function showError(errorText) {
      ensureWelcomeHidden();
      const row = document.createElement("div");
      row.className = "message-row";

      const avatar = document.createElement("div");
      avatar.className = "avatar assistant";
      avatar.textContent = "!";

      const bubbleWrap = document.createElement("div");
      const bubble = document.createElement("div");
      bubble.className = "bubble assistant error";
      bubble.innerHTML =
        '<i class="fa-solid fa-triangle-exclamation"></i> ' +
        "<strong>Ошибка:</strong> " +
        errorText;
      bubbleWrap.appendChild(bubble);

      row.appendChild(avatar);
      row.appendChild(bubbleWrap);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function sendMessage() {
      if (apiStatus !== "connected") return;
      const text = inputEl.value.trim();
      if (!text) return;

      appendMessage("user", text);
      inputEl.value = "";
      resizeTextarea();

      showThinking();

      try {
        const start = Date.now();
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text }),
        });

        const data = await res.json();
        const duration = Date.now() - start;

        hideThinking();

        if (data.success) {
          appendMessage("assistant", data.response, {
            tokens: data.tokens_used,
            time: data.response_time || duration,
          });
        } else {
          showError(data.error || "Неизвестная ошибка");
        }
      } catch (e) {
        hideThinking();
        showError("Ошибка сети: " + e.message);
      }
    }

    function clearChat() {
      messagesEl.innerHTML = "";
      const welcome = document.createElement("div");
      welcome.id = "welcome";
      welcome.className = "welcome";
      welcome.innerHTML = `
        <div class="welcome-title">Новая беседа</div>
        <div class="welcome-sub">Сформулируйте новый запрос — начнём с чистого листа.</div>
      `;
      messagesEl.appendChild(welcome);
    }

    // --- INPUT HANDLERS ---

    function resizeTextarea() {
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + "px";
    }

    inputEl.addEventListener("input", resizeTextarea);

    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Изначальная высота
    resizeTextarea();
</script>
</body>
</html>
